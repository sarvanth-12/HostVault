<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — HostVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
.admin-login-wrap { width: 100%; max-width: 420px; padding: 20px; }
.admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
.admin-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
.admin-logo-mark { width: 40px; height: 40px; background: linear-gradient(135deg,#7c3aed,#4f46e5); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.admin-logo-name { font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em; }
.admin-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,58,237,.12); color: #7c3aed; border: 1px solid rgba(124,58,237,.25); border-radius: 20px; padding: 4px 12px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 20px; }
.admin-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: 6px; }
.admin-sub { font-size: .85rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.error-msg { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 10px 14px; font-size: .85rem; color: #f87171; margin-bottom: 16px; display: none; }
.error-msg.show { display: block; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: .9rem; font-family: inherit; transition: border .15s; outline: none; }
.form-group input:focus { border-color: #7c3aed; }
.pass-wrapper { position: relative; }
.pass-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; }
.btn-admin { width: 100%; padding: 12px; background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; margin-top: 8px; }
.btn-admin:hover { opacity: .9; }
.btn-admin:disabled { opacity: .6; cursor: not-allowed; }
.back-link { text-align: center; margin-top: 20px; font-size: .82rem; color: var(--muted); }
.back-link a { color: var(--blue); text-decoration: none; }
.security-note { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: .78rem; color: var(--muted); margin-top: 20px; }
.theme-btn { position: fixed; top: 16px; right: 20px; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 15px; }
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="admin-login-wrap">
  <div class="admin-card">
    <div class="admin-logo">
      <div class="admin-logo-mark">🛡️</div>
      <div class="admin-logo-name">HostVault</div>
    </div>

    <div style="text-align:center">
      <div class="admin-badge">🔐 Admin Portal</div>
      <div class="admin-title">Admin Login Page</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- Honeypot -->
    <div style="display:none;position:absolute;left:-9999px" aria-hidden="true">
      <input type="text" name="username" tabindex="-1">
      <input type="password" name="password" tabindex="-1">
    </div>

    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="email" 
        readonly onfocus="this.removeAttribute('readonly')" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pass-wrapper">
        <input type="password" id="password" 
          readonly onfocus="this.removeAttribute('readonly')" autocomplete="new-password">
        <button class="pass-toggle" onclick="togglePass()" type="button">👁</button>
      </div>
    </div>

    <button class="btn-admin" id="loginBtn" onclick="handleLogin()">
      Sign In to Admin Panel →
    </button>



    <div class="back-link">
      Not an admin? <a href="login.html">Go to user login →</a>
    </div>
  </div>
</div>

<script>
// Theme
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.querySelector('.theme-btn').textContent=d?'🌙':'☀️';localStorage.setItem('theme',d?'light':'dark');}
const saved=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',saved);document.querySelector('.theme-btn').textContent=saved==='dark'?'☀️':'🌙';

function togglePass(){const i=document.getElementById('password');i.type=i.type==='password'?'text':'password';}

function showError(msg){const e=document.getElementById('errorMsg');e.textContent=msg;e.classList.add('show');}

// Check already logged in as admin
(async()=>{
  const res=await fetch('/api/auth/me',{credentials:'include'});
  const data=await res.json();
  if(data.authenticated && data.user.role==='admin'){
    window.location.href='/admin.html';
  }
})();

async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');

  document.getElementById('errorMsg').classList.remove('show');

  if(!email||!pass){showError('⚠️ Please enter your email and password.');return;}

  btn.textContent='Signing in…';
  btn.disabled=true;

  try{
    const res=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({email,password:pass}),
    });
    const data=await res.json();

    if(!res.ok){
      showError('⚠️ '+(data.error||'Login failed'));
      btn.textContent='Sign In to Admin Panel →';
      btn.disabled=false;
      return;
    }

    // Check if user is actually admin
    if(data.user.role!=='admin'){
      // Log out immediately — not an admin
      await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
      showError('⚠️ Access denied. This portal is for administrators only.');
      btn.textContent='Sign In to Admin Panel →';
      btn.disabled=false;
      return;
    }

    // Admin confirmed — go to admin panel
    window.location.href='/admin.html';

  }catch(err){
    showError('⚠️ Could not connect to server. Is the backend running?');
    btn.textContent='Sign In to Admin Panel →';
    btn.disabled=false;
  }
}

window.addEventListener('load',()=>{
  document.getElementById('email').value='';
  document.getElementById('password').value='';
});
document.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
